# vim: filetype=conf

# General settings
# ================

# Bind Prefix to c-space (Press 'C-space' twice to send 'C-space')
unbind C-b
set -g prefix C-space
bind C-space send-prefix
# Set default shell
set-option -g default-shell $SHELL
# Mouse support
set-option -g mouse on
# Remove escape time delay
set -sg escape-time 0
# Time in miliseconds between multiple commands to be considered as part
# of the same chain (with the '-r' flag)
set -g repeat-time 350
# Focus events enabled for terminals that support them
set -g focus-events on
# Ensure colors look correct
set-option -g default-terminal "screen-256color"
# NOTE auto rename is disabled for the given window upon manual rename.
set -g allow-rename off
# manpage says "on" is bad for shells…
set -g aggressive-resize off
# Start indices from 1 for both windows and panes
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
# Scroll history
set -g history-limit 25000
# No bells at all
set-option -g bell-action none

# Key bindings
# =============

# Key modes: emacs for status, vi for all other
set -g status-keys emacs
set -g mode-keys vi

# Unbind default key bindings, we're going to override
unbind "\$"    # rename-session
unbind ,       # rename-window
unbind %       # split-window -h
unbind '"'     # split-window
unbind }       # swap-pane -D
unbind {       # swap-pane -U
unbind [       # paste-buffer
unbind ]
unbind "'"     # select-window
unbind n       # next-window
unbind p       # previous-window
unbind l       # last-window
unbind M-n     # next window with alert
unbind M-p     # next window with alert
unbind o       # focus thru panes
unbind &       # kill-window
unbind "#"     # list-buffer
unbind =       # choose-buffer
unbind z       # zoom-pane

# Edit configuration and reload
bind C-e new-window -n 'tmux.conf' \
    "sh -c '\${EDITOR:-vim} ~/.tmux.conf && tmux source ~/.tmux.conf && tmux display \"Config reloaded\"'"

# Reload tmux configuration
bind C-r source-file ~/.tmux.conf \; display "Config reloaded"

# Panes
bind \ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind + resize-pane -Z # Zoom pane
bind x kill-pane

# Windows
bind r command-prompt -I "#{window_name}" "rename-window '%%'"
bind C-x confirm-before -p "kill other windows? (y/n)" "kill-window -a"
bind -r C-h previous-window
bind -r C-l next-window
bind -r Tab last-window   # cycle thru MRU tabs
bind-key -n MouseDrag1Status swap-window -t= # Drag to re-order
bind-key -n DoubleClick1Status new-window # Double click for new window
set-hook -g after-new-window 'command-prompt -I "#{window_name}" "rename-window '%%'"'

# Sessions
bind d detach
bind R command-prompt -I "#{session_name}" "rename-session '%%'"
bind Q confirm-before -p "kill-session #S? (y/n)" kill-session

# Copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Hide status bar on demand
bind C-s if -F '#{s/off//:status}' 'set status off' 'set status on'

# Appearence and status bar
# =========================

# Status bar
set -g status           on
set -g status-position  bottom
set -g status-interval  15
set -g monitor-activity off

# Colors (run $XDG_CONFIG_HOME/base16-shell/colortest for color codes)
set-option -g status-style fg=color21,bg=colour00,default
set-window-option -g window-status-style fg=colour08,bg=colour00
set-window-option -g window-status-current-style fg=colour03,bg=colour00
set-window-option -g pane-active-border-style fg=colour03
set-window-option -g pane-border-style fg=colour08
set-option -g message-style bg=colour00,fg=colour01
set-option -g display-panes-active-colour colour03
set-option -g display-panes-colour colour03

# Format
set -g status-left        ""
set -g status-left-length 50
set-window-option -g window-status-current-format " #[bold]#I #W "
set -g window-status-format         " #I #W "
set -g window-status-current-format " #I #W "
set -g window-status-separator      ""
set -g status-right " #S "

# Plugins
# ========

TPLUG_DIR='~/.cache/tmux/plugins'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Startup
# ========

set-environment -g TMUX_PLUGIN_MANAGER_PATH $TPLUG_DIR
if "test ! -d $TPLUG_DIR/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm $TPLUG_DIR/tpm && $TPLUG_DIR/tpm/bin/install_plugins'"
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b $TPLUG_DIR/tpm/tpm
