# vim: filetype=conf

# Base configuration
# ------------------

# Set default shell
set-option -g default-shell $SHELL
# Mouse support
set-option -g mouse on
# Remove escape time delay
set -sg escape-time 0
# Time in miliseconds between multiple commands to be considered as part
# of the same chain (with the '-r' flag)
set -g repeat-time 350
# Focus events enabled for terminals that support them
set -g focus-events on
# Ensure colors look correct
set-option -g default-terminal "screen-256color"
# NOTE auto rename is disabled for the given window upon manual rename.
set -g allow-rename off
# manpage says "on" is bad for shells…
set -g aggressive-resize off
# Start indices from 1 for both windows and panes
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
# Scroll history
set -g history-limit 25000

# Keybindings
# -----------

# Key modes: the first is for the status line, the second for all other
# modes.  With these settings, it is possible to use Emacs navigation
# where no Vi normal mode motions are possible, but keep Vi-like
# behaviour for everything else.
set -g status-keys emacs
set -g mode-keys vi

# Bind Prefix to c-space
unbind C-b
set -g prefix C-space
bind C-space send-prefix
bind l send-keys 'C-l'

# Window navigation (-r is for repeated)
bind -r C-n next-window
bind -r C-p previous-window
bind l last-window
bind S choose-session
bind . choose-window

# Use PREFIX h to split window horizontally and PREFIX v to split vertically
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"

# Pane resizing (-r is without prefix)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Drag to re-order windows
bind-key -n MouseDrag1Status swap-window -t=
# Double click on the window list to open a new window
bind-key -n DoubleClick1Status new-window

# reload config without killing server
bind r source-file $TMUX_HOME/tmux.conf \; display-message "  Config reloaded..".

# Plugins
# -------

TPLUG_DIR='~/.config/tmux/plugins'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'christoomey/vim-tmux-navigator'

# User Interface
# --------------

# Status bar
set -g status           on
set -g status-position  top
set -g status-interval  15
set -g monitor-activity off

# Left
set -g status-left        ""
set -g status-left-length 50
# Window
set -g window-status-format         " #I #W "
set -g window-status-current-format " #I #W "
set -g window-status-separator      ""
# Right
set -g status-right " #S "

# Colors
set-option -g status-bg default
set-option -g status-fg colour255
set-option -g status-attr default
set-window-option -g window-status-fg colour244 #base0
set-window-option -g window-status-bg default
set-window-option -g window-status-current-fg colour9
set-window-option -g window-status-current-bg default
set-option -g pane-border-fg colour235 #base02
set-option -g pane-active-border-fg colour240 #base01
set-option -g message-bg colour233
set-option -g message-fg colour10
set-option -g display-panes-active-colour colour33 #blue
set-option -g display-panes-colour colour166 #orange

# Startup
# -------

set-environment -g TMUX_PLUGIN_MANAGER_PATH $TPLUG_DIR
if "test ! -d $TPLUG_DIR/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm $TPLUG_DIR/tpm && $TPLUG_DIR/tpm/bin/install_plugins'"
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b $TPLUG_DIR/tpm/tpm
