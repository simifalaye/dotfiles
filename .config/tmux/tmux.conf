# vim: filetype=conf

# Base configuration
# ------------------

# Set default shell
set-option -g default-shell /bin/zsh
# Mouse support
set-option -g mouse on
# Renumber windows when one is closed
set-option -g renumber-windows on
# Remove escape time delay
set -sg escape-time 0
# Time in miliseconds between multiple commands to be considered as part
# of the same chain (with the '-r' flag
set -g repeat-time 300

# Keybindings
# -----------

# Key modes: the first is for the status line, the second for all other
# modes.  With these settings, it is possible to use Emacs navigation
# where no Vi normal mode motions are possible, but keep Vi-like
# behaviour for everything else.
set -g status-keys emacs
set -g mode-keys vi

# Bind Prefix to c-space
unbind C-b
set -g prefix C-space
bind C-space send-prefix
bind l send-keys 'C-l'

# Window navigation without prefix
bind C-n next-window
bind C-p previous-window
bind C-l last-window

# Use PREFIX = to split window horizontally and PREFIX - to split vertically
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"
bind c new-window -c '#{pane_current_path}'

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind tab last-window

# Toggle statusbar
bind C-s set-option status

# Drag to re-order windows
bind-key -n MouseDrag1Status swap-window -t=

# Double click on the window list to open a new window
bind-key -n DoubleClick1Status new-window

# reload config without killing server
bind r source-file $TMUX_HOME/tmux.conf \; display-message "  Config reloaded..".

# Plugins
# -------

TPLUG_DIR='~/.cache/.tmux/plugins'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @continuum-boot 'on'
set -g @resurrect-dir $TPLUG_DIR/resurrect

# User Interface
# --------------

# Top bar
set -g status-position top

# Title and window settings
# NOTE auto rename is disabled for the given window upon manual rename.
set -g set-titles on # string shown on titlebars or programs such as `xwininfo`
set -g set-titles-string "#T" # title format
set -g automatic-rename on # name windows with <prefix>, (sessions with <prefix>$)
set -g aggressive-resize off # manpage says "on" is bad for shells…
set -g alternate-screen on

# Start indices from 1 for both windows and panes
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Feedback (numbers represent miliseconds)
set -g display-panes-time 1200 # indicators for `display-panes` command
set -g display-time 1200 # use 0 to keep status line messages until key press

# Colors
set-option -g status-bg colour0
set-option -g status-fg colour255
set-option -g status-attr default
set-window-option -g window-status-fg colour244 #base0
set-window-option -g window-status-bg default
set-window-option -g window-status-current-fg colour9
set-window-option -g window-status-current-bg default
set-option -g pane-border-fg colour235 #base02
set-option -g pane-active-border-fg colour240 #base01
set-option -g message-bg colour233
set-option -g message-fg colour10
set-option -g display-panes-active-colour colour33 #blue
set-option -g display-panes-colour colour166 #orange
set-window-option -g clock-mode-colour green #green

# Startup
# -------

set-environment -g TMUX_PLUGIN_MANAGER_PATH $TPLUG_DIR
if "test ! -d $TPLUG_DIR/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm $TPLUG_DIR/tpm && $TPLUG_DIR/tpm/bin/install_plugins'"
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b $TPLUG_DIR/tpm/tpm
run-shell $TPLUG_DIR/tmux-resurrect/resurrect.tmux
run-shell $TPLUG_DIR/tmux-continuum/continuum.tmux
