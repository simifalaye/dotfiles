# Description
# ===========
# Configure starship prompt
# See: https://starship.rs/config/

# Disable the blank line at the start of the prompt
add_newline = false

format = """
$time\
$username\
$hostname\
$shlvl\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$jobs\
$character"""

# Modules
# ---------

[directory]
home_symbol = ""
truncation_length = 4

[line_break]
disabled = false

[time]
disabled = false
format = '[\[$time\]]($style) '
time_format = "%T"

[username]
disabled = true
